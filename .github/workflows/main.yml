name: Build gl-puli-mcu APK for XE3000

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt release version (e.g. 25.12.3)'
        required: false
        default: '25.12.3'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '25.12.3' }}
  OPENWRT_TARGET: mediatek/filogic

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev \
            python3-distutils python3-setuptools \
            rsync unzip zlib1g-dev file wget \
            xz-utils zstd

      - name: Discover and download OpenWrt SDK
        run: |
          TARGET_PATH=$(echo "$OPENWRT_TARGET" | tr '/' '/')
          BASE_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}"

          echo "Fetching SDK filename from: ${BASE_URL}/"
          SDK_NAME=$(wget -qO- "${BASE_URL}/sha256sums" \
            | grep -oP 'openwrt-sdk-[^\s]+\.tar\.zst' \
            | head -1)

          if [ -z "$SDK_NAME" ]; then
            echo "ERROR: Could not find SDK filename at ${BASE_URL}/sha256sums"
            echo "Available files:"
            wget -qO- "${BASE_URL}/sha256sums" | head -20
            exit 1
          fi

          echo "Found SDK: ${SDK_NAME}"
          echo "SDK_NAME=${SDK_NAME}" >> $GITHUB_ENV
          echo "SDK_URL=${BASE_URL}/${SDK_NAME}" >> $GITHUB_ENV

          wget -q --show-progress "${BASE_URL}/${SDK_NAME}"

      - name: Extract SDK
        run: |
          echo "Extracting ${SDK_NAME}..."
          tar --use-compress-program=zstd -xf "${SDK_NAME}"
          # SDK extracts to a dir matching the archive name minus .tar.zst
          SDK_DIR="${SDK_NAME%.tar.zst}"
          echo "SDK_DIR=${SDK_DIR}" >> $GITHUB_ENV
          mv "${SDK_DIR}" sdk

      - name: Install package source into SDK
        run: |
          mkdir -p sdk/package/gl-puli-mcu
          cp -r gl-puli-mcu/* sdk/package/gl-puli-mcu/

      - name: Configure SDK for XE3000
        run: |
          cd sdk
          make defconfig
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_gl-puli-mcu=y
          CONFIG_GL_PULI_MCU_XE3000=y
          EOF
          make defconfig

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a 2>&1 | tee /tmp/feeds-update.log
          ./scripts/feeds install -a 2>&1 | tee /tmp/feeds-install.log

      - name: Build package
        run: |
          cd sdk
          make package/gl-puli-mcu/compile -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Parallel build failed, retrying single-threaded..."
            make package/gl-puli-mcu/compile -j1 V=s 2>&1 | tail -100 | tee /tmp/build-retry.log
            exit 1
          fi

      - name: Collect APK artifact
        if: success()
        run: |
          mkdir -p output
          find sdk/bin/ \( -name "gl-puli-mcu*.apk" -o -name "gl-puli-mcu*.ipk" \) \
            -exec cp {} output/ \;
          echo "=== Built packages ==="
          ls -lh output/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gl-puli-mcu-xe3000-${{ env.OPENWRT_VERSION }}-${{ github.sha }}
          path: output/
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            /tmp/feeds-update.log
            /tmp/feeds-install.log
            /tmp/build.log
            /tmp/build-retry.log
          retention-days: 7
