name: Build gl-puli-mcu APK for XE3000

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # OpenWrt 25.12 SDK for mediatek/filogic (aarch64_cortex-a53)
  SDK_URL: https://downloads.openwrt.org/releases/25.12.0/targets/mediatek/filogic
  SDK_NAME: openwrt-sdk-25.12.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev \
            python3-distutils python3-setuptools \
            rsync unzip zlib1g-dev file wget \
            xz-utils zstd

      - name: Download OpenWrt SDK
        run: |
          wget -q "${SDK_URL}/${SDK_NAME}.tar.zst"
          tar --use-compress-program=zstd -xf "${SDK_NAME}.tar.zst"
          mv "${SDK_NAME}" sdk

      - name: Install package source into SDK
        run: |
          mkdir -p sdk/package/gl-puli-mcu
          cp -r gl-puli-mcu/* sdk/package/gl-puli-mcu/

      - name: Configure SDK for XE3000
        run: |
          cd sdk
          # Start from SDK defaults
          make defconfig
          # Enable the package, selecting XE3000 target
          cat >> .config << 'EOF'
          CONFIG_PACKAGE_gl-puli-mcu=y
          CONFIG_GL_PULI_MCU_XE3000=y
          EOF
          make defconfig

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a 2>&1 | tee /tmp/feeds-update.log
          ./scripts/feeds install -a 2>&1 | tee /tmp/feeds-install.log

      - name: Build package
        run: |
          cd sdk
          make package/gl-puli-mcu/compile -j$(nproc) V=s 2>&1 | tee /tmp/build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Parallel build failed, retrying single-threaded..."
            make package/gl-puli-mcu/compile -j1 V=s 2>&1 | tail -100 | tee /tmp/build-retry.log
            exit 1
          fi

      - name: Collect APK artifact
        if: success()
        run: |
          mkdir -p output
          find sdk/bin/ -name "gl-puli-mcu*.apk" -exec cp {} output/ \;
          find sdk/bin/ -name "gl-puli-mcu*.ipk" -exec cp {} output/ \;
          echo "=== Built packages ==="
          ls -lh output/

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gl-puli-mcu-xe3000-${{ github.sha }}
          path: output/
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            /tmp/feeds-update.log
            /tmp/feeds-install.log
            /tmp/build.log
            /tmp/build-retry.log
          retention-days: 7
